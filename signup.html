<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Signup | Apna Taste</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/signup.css">

</head>

<body>

<header class="header">
<div class="logo"><img src="./images/logo (3).png" alt="Apna Taste Logo"></div>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="menu.html">Menu</a>
<a href="cart.html">My Meal</a>
<a href="login.html">Login</a>
<a href="contact.html">Contact</a>
</nav>
</header>
<section class="signup-section">
<div class="signup-card">
<h2>Create Account</h2>
<p class="subtitle">Join Apna Taste and order delicious food 🍕</p>
<form id="signupForm">
<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone Number">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
<input type="text" id="address" placeholder="Address">
<input type="text" id="city" placeholder="City">
<input type="text" id="pincode" placeholder="Pincode">
<button type="submit">Signup</button>
<p id="error" class="error"></p>
</form>
<p class="login-link">
Already have an account?  
<a href="login.html">Login</a>
</p>
</div>
</section>
<footer class="footer">
<p>© 2026 Apna Taste | Delicious Food Delivered</p>
</footer>
<script src="js/signup.js"></script>
</body>
</html>
